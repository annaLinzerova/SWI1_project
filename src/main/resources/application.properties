spring.application.name=ProjektKodSWI
server.port=8080

# FORCING A COMPLETE DATABASE WIPE AND RECREATION
# This will create a brand new database file and drop/create schema on every startup.
# Once the app starts successfully, we will change ddl-auto back to 'update'.
spring.datasource.url=jdbc:h2:file:./data/projektkodswi_v3;MODE=Oracle;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173